<!doctype html><html><head><meta charset="utf-8"><title>pending</title></head><body style="margin:0;background:#000">
<script>
var q=new URLSearchParams(location.search),p=q.get('p')||'index.html',w=+(q.get('w')||390);
var f=document.createElement('iframe');f.src=p;f.style.cssText='width:'+w+'px;height:1400px;border:0';
f.onload=function(){setTimeout(function(){try{
var d=f.contentDocument,vw=f.clientWidth,sw=Math.max(d.documentElement.scrollWidth,d.body.scrollWidth),off=[];
d.body.querySelectorAll('*').forEach(function(el){var s=getComputedStyle(el);if(s.position==='fixed'||s.position==='absolute')return;var r=el.getBoundingClientRect();if(r.right>vw+1)off.push(el.tagName.toLowerCase()+(el.className?'.'+String(el.className).split(' ')[0]:'')+'@'+Math.round(r.right))});
document.title='OVF='+(sw>vw?sw-vw:0)+' sw='+sw+' :: '+off.slice(0,10).join(' ');
}catch(e){document.title='ERR:'+e.message}},500)};
document.body.appendChild(f);
</script></body></html>
